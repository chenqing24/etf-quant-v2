name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-benchmark
      - name: Init DB
        run: PYTHONPATH=src python scripts/init_database.py
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Run benchmark
        run: pytest tests/benchmark/ --benchmark-only --benchmark-autosave || true